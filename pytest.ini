[pytest]
# Run: pytest tests/unit          — fast, no network, runs on every save
# Run: pytest tests/contract      — schema validation, no network
# Run: pytest tests/integration   — real APIs, run daily (needs API keys)
# Run: pytest                     — everything except integration

testpaths = tests
addopts = -v --tb=short -m "not integration"

markers =
    integration: marks tests that call real external APIs (deselect with -m "not integration")
    slow: marks tests that are slow but still offline
